# =============================================================================
# Secrets overlay — keeps sensitive values out of `.env` / the environment.
#
#   1. Put real secret values (one per file) under ./secrets/*.txt
#   2. Start with both files:
#        docker compose -f docker-compose.yml -f docker-compose.secrets.yml up -d
#
# The app resolves any `<VAR>_FILE` env var by reading the file into <VAR> at
# boot (see resolveFileSecrets in env.validation.ts). `_FILE` takes precedence
# over the plaintext value inherited from .env, so these override cleanly.
# =============================================================================

services:
  nestjs-app:
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      WEBHOOK_SECRET_FILE: /run/secrets/webhook_secret
      ADMIN_PASSWORD_FILE: /run/secrets/admin_password
      S3_SECRET_ACCESS_KEY_FILE: /run/secrets/s3_secret_key
    secrets:
      - postgres_password
      - jwt_secret
      - webhook_secret
      - admin_password
      - s3_secret_key

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  webhook_secret:
    file: ./secrets/webhook_secret.txt
  admin_password:
    file: ./secrets/admin_password.txt
  s3_secret_key:
    file: ./secrets/s3_secret_key.txt
