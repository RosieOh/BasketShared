apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: s3-syncbridge
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: s3-syncbridge
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { configMapKeyRef: { name: orchestrator-config, key: POSTGRES_USER } }
            - name: POSTGRES_DB
              valueFrom: { configMapKeyRef: { name: orchestrator-config, key: POSTGRES_DB } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: orchestrator-secrets, key: POSTGRES_PASSWORD } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"] }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "1Gi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: postgres-data }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: s3-syncbridge
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
