# =============================================================================
# S3-SyncBridge — local, fully self-contained pipeline.
#
#   SFTP client --(2022)--> SFTPGo --on_upload webhook--> NestJS Orchestrator
#                                \__ shared read-only volume __/        |
#                                                                       v
#                                                   PostgreSQL (audit)  MinIO (S3)
#
# All secrets come from `.env`. Start with:  docker compose up -d --build
# =============================================================================

name: s3-syncbridge

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL — transfer audit / state store for the NestJS orchestrator.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # Logical replication (wal_level=logical) enables Debezium CDC. Harmless when
    # the streaming profile is off.
    command:
      - postgres
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Runs once on a fresh volume: creates uuid-ossp + the non-superuser app role.
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks: [syncbridge-net]
    # Bound to localhost only — not exposed on the LAN. Host port is decoupled
    # from the internal 5432 so a local Postgres on the host doesn't collide.
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis — backing store for the BullMQ transfer queue.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage (the transfer destination).
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks: [syncbridge-net]
    ports:
      - "${MINIO_API_PORT}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT}:9001"  # Web console
    healthcheck:
      # Informational only — readiness is actually gated by `minio-init` below,
      # which uses `mc` (always present) instead of relying on curl in the image.
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # MinIO bootstrap — waits for MinIO, then creates the bucket idempotently.
  # Exits 0 on success; dependents gate on `service_completed_successfully`.
  # ---------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    networks: [syncbridge-net]
    environment:
      S3_BUCKET: ${S3_BUCKET}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_LIFECYCLE_DAYS: ${S3_LIFECYCLE_DAYS}
    entrypoint: >
      /bin/sh -c '
      set -e;
      echo "Waiting for MinIO to become ready...";
      until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" >/dev/null 2>&1; do
        sleep 2;
      done;
      echo "MinIO is up. Ensuring bucket $$S3_BUCKET exists...";
      mc mb --ignore-existing "local/$$S3_BUCKET";
      mc version enable "local/$$S3_BUCKET" || true;
      if [ "$$S3_LIFECYCLE_DAYS" -gt 0 ] 2>/dev/null; then
        echo "Applying lifecycle: expire objects after $$S3_LIFECYCLE_DAYS days";
        mc ilm rule add --expire-days "$$S3_LIFECYCLE_DAYS" "local/$$S3_BUCKET" || true;
      fi;
      echo "Bucket ready.";
      '

  # ---------------------------------------------------------------------------
  # SFTPGo — SFTP ingestion entrypoint. Fires the on_upload HTTP hook.
  # Stores uploaded files on a named volume shared (read-only) with NestJS.
  # ---------------------------------------------------------------------------
  sftpgo:
    image: drakkan/sftpgo:v2.6-alpine
    restart: unless-stopped
    depends_on:
      nestjs-app:
        condition: service_started
    environment:
      TZ: ${TZ}
      # Auto-provision the first admin so the setup screen is skipped.
      # CREATE_DEFAULT_ADMIN must be enabled for the DEFAULT_ADMIN_* vars to apply.
      SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD}
      # Global filesystem action hook: POST JSON to NestJS on every upload.
      # Token is passed as a query param because the legacy hook cannot set
      # custom headers (the Event Manager UI flow in the guide uses a header).
      SFTPGO_COMMON__ACTIONS__EXECUTE_ON: upload
      SFTPGO_COMMON__ACTIONS__HOOK: "http://nestjs-app:${APP_PORT}/v1/sftp/on-upload?token=${WEBHOOK_SECRET}"
      # Keep user home dirs under the shared data volume.
      SFTPGO_USERS_BASE_DIR: /srv/sftpgo/data
    volumes:
      - sftpgo_data:/srv/sftpgo/data
      - sftpgo_config:/var/lib/sftpgo
    networks: [syncbridge-net]
    ports:
      - "${SFTPGO_SFTP_PORT}:2022"   # SFTP
      - "${SFTPGO_HTTP_PORT}:8080"   # Web admin / REST API
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # NestJS Orchestrator — receives webhooks, streams files SFTPGo -> MinIO,
  # audits everything in PostgreSQL. Reads the shared volume read-only.
  # ---------------------------------------------------------------------------
  nestjs-app:
    build:
      context: ./nestjs-app
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      APP_PORT: ${APP_PORT}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_PRETTY: ${LOG_PRETTY}
      TRANSFER_MAX_ATTEMPTS: ${TRANSFER_MAX_ATTEMPTS}
      TRANSFER_RETRY_BACKOFF_MS: ${TRANSFER_RETRY_BACKOFF_MS}
      INGESTION_DATA_ROOT: ${INGESTION_DATA_ROOT}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      RECOVERY_ENABLED: ${RECOVERY_ENABLED}
      RECOVERY_STALE_MS: ${RECOVERY_STALE_MS}
      RECOVERY_BATCH_SIZE: ${RECOVERY_BATCH_SIZE}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS}
      THROTTLE_TTL_MS: ${THROTTLE_TTL_MS}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT}
      MAX_PAYLOAD_SIZE_KB: ${MAX_PAYLOAD_SIZE_KB}
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB}
      AV_ENABLED: ${AV_ENABLED}
      CLAMAV_HOST: ${CLAMAV_HOST}
      CLAMAV_PORT: ${CLAMAV_PORT}
      ENCRYPTION_ENABLED: ${ENCRYPTION_ENABLED}
      ENCRYPTION_KEK: ${ENCRYPTION_KEK}
      ALERTS_ENABLED: ${ALERTS_ENABLED}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
      ROUTING_RULES: ${ROUTING_RULES}
      DEFAULT_TENANT: ${DEFAULT_TENANT}
      TENANT_MAP: ${TENANT_MAP}
      QUOTA_DEFAULT_MAX_BYTES: ${QUOTA_DEFAULT_MAX_BYTES}
      QUOTA_DEFAULT_MAX_OBJECTS: ${QUOTA_DEFAULT_MAX_OBJECTS}
      TENANT_QUOTAS: ${TENANT_QUOTAS}
      KAFKA_ENABLED: ${KAFKA_ENABLED}
      KAFKA_BROKERS: ${KAFKA_BROKERS}
      KAFKA_EVENTS_TOPIC: ${KAFKA_EVENTS_TOPIC}
      OTEL_ENABLED: ${OTEL_ENABLED}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      APP_DB_USER: ${APP_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_SYNCHRONIZE: ${DB_SYNCHRONIZE}
      DB_LOGGING: ${DB_LOGGING}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_UPLOAD_PART_SIZE_MB: ${S3_UPLOAD_PART_SIZE_MB}
      S3_UPLOAD_CONCURRENCY: ${S3_UPLOAD_CONCURRENCY}
    volumes:
      # Same mountpoint as SFTPGo so the absolute `path` in the webhook resolves
      # identically. Read-only: the orchestrator never mutates the source tree.
      - sftpgo_data:/srv/sftpgo/data:ro
    networks: [syncbridge-net]
    ports:
      - "${APP_HOST_PORT}:3000"
    healthcheck:
      # 127.0.0.1 (not localhost) so busybox wget uses IPv4, matching the app's
      # 0.0.0.0 bind — localhost can resolve to ::1 first and be refused.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # ClamAV — antivirus scanning (opt-in). Enable with:
  #   AV_ENABLED=true docker compose --profile av up -d
  # The image is large and freshclam needs a few minutes on first start.
  # ---------------------------------------------------------------------------
  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    profiles: ["av"]
    volumes:
      - clamav_data:/var/lib/clamav
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${CLAMAV_HOST_PORT:-13310}:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ---------------------------------------------------------------------------
  # Prometheus + Grafana — metrics scraping & dashboards (opt-in). Enable with:
  #   docker compose --profile monitoring up -d
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus_data:/prometheus
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${PROMETHEUS_HOST_PORT:-9090}:9090"

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    profiles: ["monitoring"]
    # Disable the gossip mesh — single-node, no cluster peers in this stack.
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--cluster.listen-address="
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${ALERTMANAGER_HOST_PORT:-9093}:9093"

  jaeger:
    image: jaegertracing/all-in-one:1.60
    restart: unless-stopped
    profiles: ["monitoring"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks: [syncbridge-net]
    ports:
      - "${JAEGER_UI_HOST_PORT:-16686}:16686"   # Jaeger UI
    # OTLP receiver (4318) is reached over the internal network by nestjs-app;
    # not published to the host to avoid conflicts.

  grafana:
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    profiles: ["monitoring"]
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks: [syncbridge-net]
    ports:
      - "${GRAFANA_HOST_PORT:-3001}:3000"

  # ---------------------------------------------------------------------------
  # Kafka event backbone + Debezium CDC (opt-in). Enable with:
  #   KAFKA_ENABLED=true docker compose --profile streaming up -d
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:3.8.0
    restart: unless-stopped
    profiles: ["streaming"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-19092}:9092"

  # Kafka Connect with the Debezium Postgres connector.
  connect:
    image: debezium/connect:2.7.3.Final
    restart: unless-stopped
    profiles: ["streaming"]
    depends_on: [kafka]
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: syncbridge-connect
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
    networks: [syncbridge-net]
    ports:
      - "127.0.0.1:${CONNECT_HOST_PORT:-8083}:8083"

  # Registers the Debezium connector once Connect is up.
  connect-init:
    image: curlimages/curl:8.10.1
    profiles: ["streaming"]
    depends_on: [connect]
    networks: [syncbridge-net]
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./streaming/register-postgres.json:/config/register-postgres.json:ro
    entrypoint: >
      /bin/sh -c '
      echo "Waiting for Kafka Connect...";
      until curl -sf http://connect:8083/ >/dev/null; do sleep 3; done;
      sed "s|REPLACE_PASSWORD|$$POSTGRES_PASSWORD|" /config/register-postgres.json |
        curl -s -X POST -H "Content-Type: application/json" http://connect:8083/connectors -d @- || true;
      echo "Debezium connector registered.";
      '

networks:
  syncbridge-net:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  redis_data:
  sftpgo_data:
  sftpgo_config:
  clamav_data:
  prometheus_data:
  grafana_data:
  kafka_data:
