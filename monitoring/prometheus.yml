global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: s3-syncbridge
    metrics_path: /metrics
    static_configs:
      - targets: ["nestjs-app:3000"]
